name: Hourly Article Ingest

on:
  schedule:
    - cron: "0 * * * *"   # every hour at :00
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ingest
        run: |
          curl -s -X POST \
            "${{ secrets.VERCEL_URL }}/api/ingest" \
            -H "Authorization: Bearer ${{ secrets.INGEST_SECRET }}" \
            | tee /dev/stderr | python3 -m json.tool
