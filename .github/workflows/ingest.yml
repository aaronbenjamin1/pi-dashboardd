name: Hourly Article Ingest

on:
  schedule:
    - cron: "0 * * * *"   # every hour at :00
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ingest
        run: |
          echo "Calling: ${{ secrets.VERCEL_URL }}/api/ingest"
          RESPONSE=$(curl -s -w "\n---HTTP_STATUS:%{http_code}" -X POST \
            "${{ secrets.VERCEL_URL }}/api/ingest" \
            -H "Authorization: Bearer ${{ secrets.INGEST_SECRET }}")
          HTTP_STATUS=$(echo "$RESPONSE" | grep -o 'HTTP_STATUS:[0-9]*' | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | sed '/---HTTP_STATUS:/d')
          echo "HTTP Status: $HTTP_STATUS"
          echo "Response body:"
          echo "$BODY"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "(response was not JSON)"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "ERROR: Expected HTTP 200, got $HTTP_STATUS"
            exit 1
          fi
